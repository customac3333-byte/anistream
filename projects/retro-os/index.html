<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro OS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="back-link" href="../../index.html">← Back to Hub</a>
    <div class="desktop">
      <div class="desktop-icons">
        <div class="icon">📁 Files</div>
        <div class="icon">💾 Drive</div>
        <div class="icon">📝 Notes</div>
      </div>

      <div class="window" id="window-notepad">
        <div class="titlebar">
          <span>Notepad</span>
          <button class="close-btn">×</button>
        </div>
        <textarea>Welcome to the retro desktop. Type notes here.</textarea>
      </div>

      <div class="taskbar">
        <div class="start">Start</div>
        <div class="clock" id="clock">--:--</div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
